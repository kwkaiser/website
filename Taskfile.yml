version: '3'

tasks:
  clean:
    cmds:
      - rm -rf public

  dev:
    cmds:
      - hugo server

  build-resume:
    desc: Compile the typst resume into both static/pdf and content/.
    sources:
      - docs/resume.typ
    generates:
      - static/pdf/resume.pdf
      - content/resume.pdf
    cmds:
      - typst compile docs/resume.typ static/pdf/resume.pdf
      - cp static/pdf/resume.pdf content/resume.pdf

  build:
    deps: [build-resume]
    cmds:
      - rm -rf public
      - hugo

  build-docker:
    desc: Build the Docker image; skipped when no inputs have changed.
    deps: [build-resume]
    sources:
      - Dockerfile
      - hugo.toml
      - go.mod
      - go.sum
      - content/**/*
      - static/**/*
      - layouts/**/*
      - archetypes/**/*
    generates:
      - .task/build-docker.iid
    cmds:
      - mkdir -p .task
      - docker build -t kwkaiser/website --iidfile .task/build-docker.iid .

  deploy:
    deps: [build-docker]
    cmds:
      - docker-compose up -d

  redeploy:
    deps: [build-docker]
    cmds:
      - docker-compose down
      - docker-compose up -d